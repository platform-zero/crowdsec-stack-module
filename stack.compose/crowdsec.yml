services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.6.4
    container_name: crowdsec
    restart: unless-stopped
    networks:
      caddy:
      docker-proxy:
      monitoring:
    depends_on:
      caddy:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
    environment:
      COLLECTIONS: crowdsecurity/linux crowdsecurity/caddy
      CUSTOM_HOSTNAME: webservices-crowdsec
      DISABLE_ONLINE_API: "true"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      GID: ${DOCKER_GROUP_ID:-1000}
    volumes:
      - crowdsec_config:/etc/crowdsec
      - crowdsec_data:/var/lib/crowdsec/data
      - ./configs/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - ./configs/crowdsec/simulate-alert.sh:/usr/local/bin/webservices-crowdsec-simulate-alert:ro
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s

volumes:
  crowdsec_config:
  crowdsec_data:
